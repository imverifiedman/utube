<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avasam Core | YouTube Downloader</title>
    <style>
        /* --- Typography & Base --- */
        @font-face { font-family: 'YekanBakh'; src: url('YekanBakh.woff') format('woff'); font-weight: normal; }
        :root { --red-glow: rgba(255, 20, 40, 0.15); --glass-bg: rgba(15, 15, 15, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #eaeaea; --text-muted: #888; --success: #2ecc71; --danger: #e74c3c; --accent: #ff2a40; }
        
        body { margin: 0; padding: 20px; font-family: 'YekanBakh', Tahoma, sans-serif; background-color: #050505; color: var(--text-main); min-height: 100vh; display: flex; gap: 25px; overflow-x: hidden; }
        
        /* --- Animated Background --- */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; animation: float 12s infinite alternate ease-in-out; }
        .light-1 { width: 50vw; height: 50vw; background: rgba(220, 20, 50, 0.12); top: -20%; left: -10%; }
        .light-2 { width: 40vw; height: 40vw; background: rgba(150, 0, 20, 0.1); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* --- Glassmorphism UI --- */
        .glass { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        /* --- Layout --- */
        .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        .main { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; max-width: calc(100vw - 380px); }
        @media (max-width: 900px) { body { flex-direction: column; padding: 10px; } .sidebar, .main { width: 100%; max-width: 100%; } }

        /* --- Components --- */
        h2, h3 { margin: 0 0 15px 0; font-weight: bold; color: #fff; font-size: 1.1rem; display: flex; align-items: center; justify-content: space-between; }
        h2::before, h3::before { content: ''; display: inline-block; width: 4px; height: 18px; background: var(--accent); border-radius: 4px; margin-left: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px 15px; margin-bottom: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.9rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
        select option { background: #111; color: #fff; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .flex-row input { margin-bottom: 0; }
        
        button { padding: 12px 20px; border: none; border-radius: 10px; font-family: inherit; font-size: 0.95rem; cursor: pointer; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #d31027, #ea384d); width: 100%; font-weight: bold; }
        .btn-primary:hover { box-shadow: 0 5px 20px rgba(234, 56, 77, 0.4); transform: translateY(-2px); }
        .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; width: auto; flex-shrink: 0; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; background: rgba(255,255,255,0.1); border-radius: 6px; width: auto; }
        
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .badge { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .badge-remove { color: var(--danger); cursor: pointer; font-weight: bold; }

        /* --- Stats & Logs --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); }

        .log-container { display: flex; flex-direction: column; gap: 12px; }
        .log-item { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; transition: 0.3s; }
        .log-item.success { border-color: rgba(46, 204, 113, 0.4); background: rgba(46, 204, 113, 0.05); }
        .log-item.deleted { border-color: rgba(231, 76, 60, 0.4); background: rgba(231, 76, 60, 0.05); filter: grayscale(1); opacity: 0.7; }
        
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;}
        .log-step { font-size: 0.85rem; color: #aaa; font-family: monospace; }
        
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 0.85rem; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .file-row a { color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .file-row a:hover { color: var(--accent); }
        
        /* --- Custom Toast Notification --- */
        #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
        .toast { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(10px); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 8px; color: #fff; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards; display: flex; align-items: center; gap: 10px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div id="toast-container"></div>

    <!-- سایدبار تنظیمات -->
    <div class="sidebar">
        <div class="glass">
            <h3>کلیدهای API یوتیوب</h3>
            <div class="flex-row">
                <input type="password" id="newYtKey" placeholder="وارد کردن توکن جدید...">
                <button class="btn-icon" onclick="addYtKey()">+</button>
            </div>
            <div id="ytKeysList" class="badge-list"></div>
        </div>

        <div class="glass">
            <h3>مدیریت اکانت‌ها (گیت‌هاب)</h3>
            <input type="text" id="accOwner" placeholder="یوزرنیم اکانت">
            <input type="text" id="accRepo" placeholder="نام مخزن (مثال: UDL)">
            <input type="password" id="accToken" placeholder="توکن گیت‌هاب (PAT)">
            <button class="btn-primary" onclick="addAccount()" style="margin-bottom: 15px;">افزودن اکانت</button>
            <div id="accountsList" class="badge-list"></div>
        </div>
    </div>

    <!-- بخش اصلی -->
    <div class="main">
        <div class="glass">
            <h3>دانلودر مرکزی</h3>
            <textarea id="videoUrls" rows="3" placeholder="لینک‌های یوتیوب (با فاصله جدا کنید)..."></textarea>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px;">
                <select id="quality">
                    <option value="best">👑 بهترین کیفیت</option>
                    <option value="2160">4K (2160p)</option>
                    <option value="1440">2K (1440p)</option>
                    <option value="1080">FHD (1080p)</option>
                    <option value="720">HD (720p)</option>
                    <option value="480">SD (480p)</option>
                    <option value="360">Low (360p)</option>
                    <option value="audio">🎵 فقط صدا (MP3)</option>
                </select>
                <input type="text" id="password" placeholder="رمز فایل فشرده (اختیاری)">
                <label style="display:flex; align-items:center; gap:8px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); cursor:pointer;">
                    <input type="checkbox" id="subtitles" style="width: auto; margin: 0;"> زیرنویس
                </label>
            </div>
            
            <button class="btn-primary" id="startBtn" onclick="processDownloads()">🚀 آغاز پردازش و دانلود توزیع‌شده</button>
        </div>

        <!-- آمار کلی -->
        <div class="stats-grid">
            <div class="stat-box"><div class="stat-val" id="stTotalLinks">0</div><div class="stat-label">تعداد لینک‌ها</div></div>
            <div class="stat-box"><div class="stat-val" id="stTotalTime">0h 0m</div><div class="stat-label">مجموع زمان</div></div>
            <div class="stat-box"><div class="stat-val" id="stTotalSize">0 GB</div><div class="stat-label">تخمین حجم</div></div>
        </div>

        <!-- مانیتورینگ و مخزن زنده -->
        <div class="glass" style="flex-grow: 1;">
            <h3>
                <span>مخزن زنده و لاگ سیستم</span>
                <div style="display:flex; gap:10px;">
                    <button class="btn-small" onclick="copyAllLinks()">📋 کپی کل لینک‌ها</button>
                    <button class="btn-small" onclick="wipeAll()" style="color:var(--danger); border-color:var(--danger);">🔥 پاکسازی همه‌چیز</button>
                    <button class="btn-small" onclick="syncLiveVault()">🔄 سینک مخزن</button>
                </div>
            </h3>
            <div id="liveVault" class="log-container">
                <div style="text-align:center; color:#666; padding: 20px;">در حال همگام‌سازی با گیت‌هاب...</div>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 1. هسته مدیریت داده‌ها (State)
    // ==========================================
    let ytKeys = JSON.parse(localStorage.getItem('av_ytkeys')) || [];
    let accounts = JSON.parse(localStorage.getItem('av_accounts')) || [];
    let activeTasks = JSON.parse(localStorage.getItem('av_tasks')) || []; // تسک‌های درحال اجرا
    let liveFiles = []; // فایل‌های واقعی سینک شده از گیت‌هاب

    const BRANCH = 'main'; // هاردکد شده

    // ==========================================
    // 2. توابع UI و نوتیفیکیشن
    // ==========================================
    function showToast(msg, isError = false) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        if(isError) toast.style.borderLeftColor = 'var(--danger)';
        toast.innerHTML = `${isError ? '❌' : '✨'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 4000);
    }

    // --- مدیریت API یوتیوب ---
    function addYtKey() {
        const key = document.getElementById('newYtKey').value.trim();
        if(!key) return;
        if(!ytKeys.includes(key)) ytKeys.push(key);
        localStorage.setItem('av_ytkeys', JSON.stringify(ytKeys));
        document.getElementById('newYtKey').value = '';
        renderKeys();
    }
    function removeYtKey(idx) { ytKeys.splice(idx, 1); localStorage.setItem('av_ytkeys', JSON.stringify(ytKeys)); renderKeys(); }
    function renderKeys() {
        const box = document.getElementById('ytKeysList');
        box.innerHTML = ytKeys.length ? '' : '<span style="font-size:12px; color:#666;">کلیدی یافت نشد</span>';
        ytKeys.forEach((k, i) => box.innerHTML += `<div class="badge">🔑 ...${k.slice(-6)} <span class="badge-remove" onclick="removeYtKey(${i})">✖</span></div>`);
    }

    // --- مدیریت اکانت‌ها ---
    function addAccount() {
        const owner = document.getElementById('accOwner').value.trim();
        const repo = document.getElementById('accRepo').value.trim();
        const token = document.getElementById('accToken').value.trim();
        if(!owner || !repo || !token) return showToast('تمام فیلدهای اکانت اجباری است', true);
        
        accounts.push({ owner, repo, token, id: Date.now() });
        localStorage.setItem('av_accounts', JSON.stringify(accounts));
        document.getElementById('accOwner').value = ''; document.getElementById('accRepo').value = ''; document.getElementById('accToken').value = '';
        renderAccounts();
        syncLiveVault(); // آپدیت لایو
    }
    function removeAccount(idx) { accounts.splice(idx, 1); localStorage.setItem('av_accounts', JSON.stringify(accounts)); renderAccounts(); }
    function renderAccounts() {
        const box = document.getElementById('accountsList');
        box.innerHTML = accounts.length ? '' : '<span style="font-size:12px; color:#666;">اکانتی متصل نیست</span>';
        accounts.forEach((a, i) => box.innerHTML += `<div class="badge">👤 ${a.owner}/${a.repo} <span class="badge-remove" onclick="removeAccount(${i})">✖</span></div>`);
    }

    renderKeys(); renderAccounts();

    // ==========================================
    // 3. موتور پردازش یوتیوب (تخمین حجم و زمان)
    // ==========================================
    async function fetchYTData(videoIds) {
        if(ytKeys.length === 0) return videoIds.map(() => 3600); // پیش‌فرض 1 ساعت
        const idsString = videoIds.join(',');
        
        for(let key of ytKeys) {
            try {
                let res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${idsString}&key=${key}`);
                if(res.ok) {
                    let data = await res.json();
                    let map = {};
                    data.items.forEach(i => {
                        let m = i.contentDetails.duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
                        map[i.id] = (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0);
                    });
                    return videoIds.map(id => map[id] || 3600);
                }
            } catch(e) {}
        }
        showToast('تمام کلیدهای یوتیوب مسدود یا نامعتبرند. استفاده از تخمین فرضی.', true);
        return videoIds.map(() => 3600);
    }

    function calcSize(seconds, q) {
        const m = seconds/60;
        const rates = { 'best':80, '2160':150, '1440':90, '1080':35, '720':15, '480':8, '360':5, 'audio':1.5 };
        return m * (rates[q] || 20);
    }

    function updateStatsUI(totalSec, totalMB, count) {
        document.getElementById('stTotalLinks').innerText = count;
        document.getElementById('stTotalSize').innerText = (totalMB / 1024).toFixed(2) + ' GB';
        let h = Math.floor(totalSec / 3600); let m = Math.floor((totalSec % 3600) / 60);
        document.getElementById('stTotalTime').innerText = `${h}h ${m}m`;
    }

    // ==========================================
    // 4. عملیات توزیع و استارت اکشن
    // ==========================================
    async function processDownloads() {
        if(accounts.length === 0) return showToast('ابتدا یک اکانت گیت‌هاب اضافه کنید', true);
        const rawUrls = document.getElementById('videoUrls').value.trim().split(/\s+/).filter(u => u.length > 5);
        if(!rawUrls.length) return showToast('لینکی وارد نشده است', true);

        const quality = document.getElementById('quality').value;
        const password = document.getElementById('password').value;
        const subtitles = document.getElementById('subtitles').checked ? 'true' : 'false';
        const startBtn = document.getElementById('startBtn');

        startBtn.innerHTML = "⏳ در حال استخراج متا و محاسبه بار..."; startBtn.disabled = true;

        const videoIds = rawUrls.map(u => { let m = u.match(/[?&]v=([^&]+)|youtu\.be\/([^?]+)/); return m ? (m[1]||m[2]) : null; }).filter(i=>i);
        const durations = await fetchYTData(videoIds);
        
        let totalSec = 0; let totalMB = 0;
        let vids = rawUrls.map((url, i) => {
            let s = durations[i]||3600; let mb = calcSize(s, quality);
            totalSec+=s; totalMB+=mb; return { url, mb };
        });
        
        updateStatsUI(totalSec, totalMB, vids.length);

        // Load Balancing (Max 11 items or 3500MB per account)
        let batches = []; let cur = { accIdx: 0, urls: [], mb: 0 };
        for(let v of vids) {
            if(cur.urls.length >= 11 || (cur.mb + v.mb) > 3500) { batches.push(cur); cur = { accIdx: cur.accIdx+1, urls: [], mb: 0 }; }
            if(cur.accIdx >= accounts.length) { showToast(`ظرفیت اکانت‌ها پر شد. ${vids.length - batches.flatMap(b=>b.urls).length} ویدیو نادیده گرفته شد.`, true); break; }
            cur.urls.push(v.url); cur.mb += v.mb;
        }
        if(cur.urls.length > 0 && cur.accIdx < accounts.length) batches.push(cur);

        // Dispatch
        for(let b of batches) {
            const acc = accounts[b.accIdx];
            const tId = Date.now() + Math.random().toString(36).substr(2,5);
            activeTasks.push({ id: tId, acc, status: 'queued', step: 'ارسال دستور به سرور...', started: Date.now() });
            saveState();
            
            fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/actions/workflows/video-getter.yml/dispatches`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${acc.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: BRANCH, inputs: { video_urls: b.urls.join(' '), quality, download_subtitles: subtitles, password } })
            }).catch(() => showToast('خطا در ارتباط با سرور گیت‌هاب', true));
        }

        document.getElementById('videoUrls').value = '';
        startBtn.innerHTML = "🚀 آغاز پردازش و دانلود توزیع‌شده"; startBtn.disabled = false;
        showToast('دستورات با موفقیت به کلاستر ارسال شد.');
        startMonitor();
    }

    // ==========================================
    // 5. مانیتورینگ لایو گیت‌هاب
    // ==========================================
    let monitorTimer;
    function startMonitor() {
        renderVault();
        if(monitorTimer) clearInterval(monitorTimer);
        monitorTimer = setInterval(async () => {
            let active = false;
            for(let t of activeTasks) {
                if(t.status !== 'success' && t.status !== 'failed') { active = true; await checkTask(t); }
            }
            if(active) renderVault(); else { clearInterval(monitorTimer); syncLiveVault(); }
        }, 10000);
    }

    async function checkTask(task) {
        const acc = task.acc;
        try {
            // پیدا کردن ران فعال
            let res = await fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/actions/runs?per_page=3`, { headers: { 'Authorization': `Bearer ${acc.token}` } });
            let data = await res.json();
            let run = data.workflow_runs.find(r => new Date(r.created_at).getTime() >= task.started - 60000 && r.name.includes("01"));
            
            if(run) {
                if(run.status === 'completed') {
                    task.status = run.conclusion === 'success' ? 'success' : 'failed';
                    task.step = task.status === 'success' ? 'عملیات با موفقیت پایان یافت' : 'خطا در عملیات';
                    saveState(); return;
                }
                
                // گرفتن استپ‌های زنده (مانیتورینگ دقیق)
                let jobRes = await fetch(run.jobs_url, { headers: { 'Authorization': `Bearer ${acc.token}` } });
                let jobData = await jobRes.json();
                if(jobData.jobs && jobData.jobs.length > 0) {
                    let steps = jobData.jobs[0].steps;
                    let currentStep = steps.reverse().find(s => s.status === 'in_progress' || s.status === 'completed');
                    if(currentStep) task.step = currentStep.name;
                }
                saveState();
            }
        } catch(e) {}
    }

    // ==========================================
    // 6. سینک و رندر مخزن واقعی (Real Vault)
    // ==========================================
    async function syncLiveVault() {
        showToast('در حال همگام‌سازی با مخازن...');
        liveFiles = [];
        for(let acc of accounts) {
            try {
                let res = await fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/contents/videos?ref=${BRANCH}`, { headers: { 'Authorization': `Bearer ${acc.token}` } });
                if(!res.ok) continue;
                let folders = await res.json();
                
                for(let f of folders) {
                    if(f.type === 'dir') {
                        let fres = await fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/contents/${f.path}?ref=${BRANCH}`, { headers: { 'Authorization': `Bearer ${acc.token}` } });
                        let files = await fres.json();
                        let dlFiles = [];
                        for(let file of files) {
                            if(!file.name.endsWith('.jpg') && !file.name.endsWith('.md')) {
                                let rawUrl = `https://raw.githubusercontent.com/${acc.owner}/${acc.repo}/${BRANCH}/${file.path}`;
                                dlFiles.push({ name: file.name, url: rawUrl, health: 'checking' });
                            }
                        }
                        if(dlFiles.length > 0) liveFiles.push({ acc, folder: f.name, files: dlFiles, deleted: false });
                    }
                }
            } catch(e) {}
        }
        
        // پاک کردن تسک‌های قدیمی موفق، چون حالا در liveFiles هستند
        activeTasks = activeTasks.filter(t => t.status !== 'success');
        saveState();
        renderVault();
        checkLinksHealth();
    }

    async function checkLinksHealth() {
        for(let block of liveFiles) {
            if(block.deleted) continue;
            for(let f of block.files) {
                try {
                    // چک کردن هدر برای دیدن زنده بودن لینک بدون دانلود آن
                    let res = await fetch(f.url, { method: 'HEAD' });
                    f.health = res.ok ? 'ok' : 'dead';
                } catch(e) { f.health = 'dead'; }
            }
        }
        renderVault();
    }

    function renderVault() {
        const box = document.getElementById('liveVault');
        box.innerHTML = '';
        
        // رندر تسک‌های در حال اجرا (مانیتورینگ)
        activeTasks.forEach(t => {
            let color = t.status === 'failed' ? 'var(--danger)' : '#f39c12';
            box.innerHTML += `
            <div class="log-item">
                <div class="log-header">
                    <span>⚙️ پردازش روی: <b>${t.acc.repo}</b></span>
                    <span class="badge" style="color:${color}">${t.status === 'queued' ? 'در صف' : t.status === 'failed' ? 'شکست' : 'در حال اجرا'}</span>
                </div>
                <div class="log-step">▶ آخرین وضعیت: ${t.step}</div>
            </div>`;
        });

        // رندر فایل‌های واقعی سینک شده
        liveFiles.forEach((block, idx) => {
            let filesHtml = block.files.map(f => {
                let icon = f.health === 'ok' ? '✅' : (f.health === 'dead' ? '❌' : '⏳');
                return `<div class="file-row">
                    <a href="${f.url}" target="_blank">🎬 ${f.name}</a>
                    <span>${icon}</span>
                </div>`;
            }).join('');

            box.innerHTML += `
            <div class="log-item ${block.deleted ? 'deleted' : 'success'}" id="block-${idx}">
                <div class="log-header">
                    <span>📁 <b>${block.folder}</b> <span style="font-size:10px; color:#666;">(${block.acc.repo})</span></span>
                    <button class="btn-small" onclick="wipeSingle('${idx}')" ${block.deleted?'disabled':''} style="border-color:var(--danger); color:var(--danger);">🗑️ حذف</button>
                </div>
                ${filesHtml}
                ${block.deleted ? '<div style="color:var(--danger); font-size:12px; margin-top:10px; text-align:center;">این ویدیو از مخزن حذف شده است.</div>' : ''}
            </div>`;
        });

        if(!activeTasks.length && !liveFiles.length) box.innerHTML = '<div style="text-align:center; color:#666; padding: 20px;">مخزن خالی است.</div>';
    }

    function copyAllLinks() {
        let links = [];
        liveFiles.forEach(b => { if(!b.deleted) b.files.forEach(f => { if(f.health === 'ok') links.push(f.url); }) });
        if(links.length === 0) return showToast('لینک سالمی برای کپی یافت نشد.', true);
        navigator.clipboard.writeText(links.join('\n'));
        showToast(`تعداد ${links.length} لینک سالم در کلیپ‌بورد کپی شد.`);
    }

    // ==========================================
    // 7. پروتکل پاکسازی اتمیک (متوالی و هوشمند)
    // ==========================================
    async function executeWipeProtocol(acc, callback) {
        showToast(`در حال حذف ویدیوها از مخزن ${acc.repo}...`);
        try {
            // 1. اجرای Cleaner
            await fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/actions/workflows/cleaner.yml/dispatches`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${acc.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: BRANCH, inputs: { confirm_delete: "true" } })
            });

            // صبر میکنیم 15 ثانیه تا اکشن حذف کارش را بکند
            setTimeout(async () => {
                showToast(`در حال پاکسازی تاریخچه زباله گیت‌هاب (${acc.repo})...`);
                // 2. اجرای History Cleaner
                await fetch(`https://api.github.com/repos/${acc.owner}/${acc.repo}/actions/workflows/history_cleaner.yml/dispatches`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${acc.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: BRANCH, inputs: { info: "Auto-triggered" } })
                });
                showToast(`پاکسازی ${acc.repo} با موفقیت در سرور ثبت شد.`);
                if(callback) callback();
            }, 15000);
        } catch(e) { showToast('خطا در ارتباط با سرور برای پاکسازی', true); }
    }

    function wipeSingle(idx) {
        let block = liveFiles[idx];
        if(!block || block.deleted) return;
        executeWipeProtocol(block.acc, () => {
            // تغییر وضعیت ظاهری به حذف شده بدون رفرش کل
            block.deleted = true;
            block.files.forEach(f => f.health = 'dead');
            renderVault();
        });
    }

    function wipeAll() {
        if(accounts.length === 0) return;
        showToast('🔥 پروتکل انهدام کلی استارت خورد...');
        accounts.forEach(acc => executeWipeProtocol(acc, () => {
            liveFiles.forEach(b => { if(b.acc.repo === acc.repo) { b.deleted = true; b.files.forEach(f=>f.health='dead'); }});
            renderVault();
        }));
    }

    // Utils
    function saveState() { localStorage.setItem('av_tasks', JSON.stringify(activeTasks)); }
    
    // Auto-Start
    if(accounts.length > 0) syncLiveVault();
    if(activeTasks.length > 0) startMonitor();
</script>
</body>
</html>
